<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOMATO Objective — Q1–50</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --card: #1e1e24;
    --border: #2a2a34;
    --accent: #e8c547;
    --accent2: #5b8dee;
    --accent3: #e85d75;
    --text: #e8e8f0;
    --muted: #7a7a8c;
    --tag-bg: #252530;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,197,71,.12), transparent);
    pointer-events: none;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent);
  }
  header p {
    margin-top: .5rem;
    color: var(--muted);
    font-size: .9rem;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: .5rem;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 50;
  }
  .filter-btn {
    padding: .35rem .85rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: .78rem;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,197,71,.08);
  }

  /* ── MAIN GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 420px), 1fr));
    gap: 1.25rem;
    padding: 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color .2s, transform .2s;
    display: flex; flex-direction: column;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card-head {
    display: flex; align-items: center; gap: .75rem;
    padding: .85rem 1.1rem .7rem;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 2.2rem;
  }
  .q-topic {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .72rem;
    padding: .25rem .6rem;
    border-radius: 999px;
    border: 1px solid;
    white-space: nowrap;
  }

  .card-body {
    padding: 1rem 1.1rem;
    flex: 1;
  }
  .q-text {
    font-size: .92rem;
    line-height: 1.65;
    color: var(--text);
  }
  .q-text .math {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .88em;
    color: var(--accent2);
  }

  /* options */
  .options {
    margin-top: .85rem;
    display: flex; flex-direction: column; gap: .35rem;
  }
  .opt {
    display: flex; gap: .5rem; align-items: flex-start;
    font-size: .87rem;
    padding: .25rem 0;
    color: var(--muted);
  }
  .opt-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .8rem;
    color: var(--accent);
    min-width: 1.4rem;
  }

  /* card footer */
  .card-foot {
    padding: .75rem 1.1rem;
    border-top: 1px solid var(--border);
    display: flex; gap: .6rem;
  }
  .btn {
    flex: 1;
    padding: .45rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: .78rem;
    cursor: pointer;
    letter-spacing: .04em;
    transition: all .2s;
  }
  .btn-hint {
    color: var(--accent2);
    border-color: rgba(91,141,238,.35);
  }
  .btn-hint:hover, .btn-hint.revealed {
    background: rgba(91,141,238,.12);
    border-color: var(--accent2);
  }
  .btn-ans {
    color: var(--accent);
    border-color: rgba(232,197,71,.35);
  }
  .btn-ans:hover, .btn-ans.revealed {
    background: rgba(232,197,71,.1);
    border-color: var(--accent);
  }

  /* hint / solution box */
  .reveal-box {
    margin: 0 1.1rem .85rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: none;
  }
  .reveal-box.show { display: block; }
  .reveal-box .rb-head {
    padding: .4rem .75rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .rb-hint .rb-head { background: rgba(91,141,238,.15); color: var(--accent2); }
  .rb-ans  .rb-head { background: rgba(232,197,71,.12); color: var(--accent); }
  .reveal-box .rb-body {
    padding: .65rem .75rem;
    font-size: .86rem;
    line-height: 1.7;
    color: var(--text);
  }
  .reveal-box .rb-body .step {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent2);
    font-size: .83em;
    display: block;
    margin: .15rem 0;
  }
  .correct-opt {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent3);
    font-weight: 600;
  }

  /* topic colours */
  .t-arith    { color: #e8c547; border-color: rgba(232,197,71,.4);  }
  .t-speed    { color: #5b8dee; border-color: rgba(91,141,238,.4);  }
  .t-seq      { color: #7eda9c; border-color: rgba(126,218,156,.4); }
  .t-algebra  { color: #e887c0; border-color: rgba(232,135,192,.4); }
  .t-numtheo  { color: #f4a261; border-color: rgba(244,162,97,.4);  }
  .t-calendar { color: #a8dadc; border-color: rgba(168,218,220,.4); }
  .t-sets     { color: #c77dff; border-color: rgba(199,125,255,.4); }
  .t-logic    { color: #74b3ce; border-color: rgba(116,179,206,.4); }
  .t-analysis { color: #f4d35e; border-color: rgba(244,211,94,.4);  }
  .t-comb     { color: #90e0ef; border-color: rgba(144,224,239,.4); }

  /* hidden card */
  .card[data-hidden="true"] { display: none; }

  /* count badge */
  #count-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .78rem;
    color: var(--muted);
    padding: 0 2rem 1rem;
    text-align: right;
    max-width: 1400px;
    margin: 0 auto;
  }

  @media (max-width: 600px) {
    .grid { padding: 1rem; gap: 1rem; }
    header { padding: 2rem 1rem 1.5rem; }
    .filter-bar { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>TOMATO Objective</h1>
  <p>Questions 1 – 50 &nbsp;·&nbsp; Click hint / answer to reveal</p>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-topic="all">All</button>
  <button class="filter-btn" data-topic="arith">Arithmetic &amp; %</button>
  <button class="filter-btn" data-topic="speed">Work &amp; Speed</button>
  <button class="filter-btn" data-topic="seq">Sequences</button>
  <button class="filter-btn" data-topic="algebra">Algebra</button>
  <button class="filter-btn" data-topic="numtheo">Number Theory</button>
  <button class="filter-btn" data-topic="calendar">Calendar &amp; Clock</button>
  <button class="filter-btn" data-topic="sets">Set Theory</button>
  <button class="filter-btn" data-topic="logic">Logic &amp; Languages</button>
  <button class="filter-btn" data-topic="analysis">Real Analysis</button>
  <button class="filter-btn" data-topic="comb">Combinatorics</button>
</div>

<div id="count-badge">Showing <span id="vis-count">50</span> / 50 questions</div>

<div class="grid" id="grid"></div>

<script>
/* ─────────────────────────────────────────────
   DATA — 50 questions
───────────────────────────────────────────── */
const Qs = [
  {
    n:1, topic:"arith", tLabel:"Arithmetic & %",
    q:"A worker suffers a 20% cut in wages. He regains his original pay by obtaining a rise of",
    opts:["20%","22.5%","25%","27.5%"],
    hint:"If original wage = x, after 20% cut it becomes 0.8x. What percentage of 0.8x equals 0.2x?",
    ans:"(c) 25%",
    sol:"New wage = 0.8x. Rise needed = 0.2x. Rise % on new wage = (0.2x / 0.8x) × 100 = 25%."
  },
  {
    n:2, topic:"speed", tLabel:"Work & Speed",
    q:"If m men can do a job in d days, then the number of days in which m + r men can do the job is",
    opts:["d + r","(d/m)(m + r)","d/(m + r)","md/(m + r)"],
    hint:"Total work = m × d man-days. Divide by (m + r) men.",
    ans:"(d) md/(m + r)",
    sol:"Total work = md man-days. With (m+r) men: time = md/(m+r)."
  },
  {
    n:3, topic:"speed", tLabel:"Work & Speed",
    q:"A boy walks to school at 6 kmph and returns at 2 kmph. His average speed (in kmph) is",
    opts:["3","4","5","√12"],
    hint:"Average speed for equal distances = 2ab/(a+b), not (a+b)/2.",
    ans:"(a) 3",
    sol:"Avg speed = 2 × 6 × 2 / (6 + 2) = 24/8 = 3 kmph."
  },
  {
    n:4, topic:"speed", tLabel:"Work & Speed",
    q:"A car travels P→Q at 30 kmph and Q→P at 40 kmph. Average speed (kmph) is nearest to",
    opts:["33","34","35","36"],
    hint:"Use harmonic mean: 2ab/(a+b).",
    ans:"(b) 34",
    sol:"Avg = 2×30×40/(30+40) = 2400/70 ≈ 34.3 kmph, nearest to 34."
  },
  {
    n:5, topic:"arith", tLabel:"Arithmetic & %",
    q:"A man invests ₹10000; ₹4000 at 5%, ₹3500 at 4%, rest at α%. Total interest = ₹500. Then α =",
    opts:["6.2","6.3","6.4","6.5"],
    hint:"Interest from ₹4000 and ₹3500 first. Remaining ₹2500 at α%.",
    ans:"(c) 6.4",
    sol:"I₁ = 200, I₂ = 140, rest = ₹2500. 200+140+25α = 500 → α = 160/25 = 6.4."
  },
  {
    n:6, topic:"seq", tLabel:"Sequences",
    q:"Let x₁,x₂,…,x₁₀₀ be positive integers with xᵢ + xᵢ₊₁ = k for all i. If x₁₀ = 1, then x₁ =",
    opts:["k","k−1","k+1","1"],
    hint:"The sequence alternates: odd-indexed terms equal one value, even-indexed another.",
    ans:"(b) k − 1",
    sol:"x₁₀=1 (even index) ⇒ x₉ = k−1, x₈=1, ... The odd-indexed terms = k−1 and even-indexed = 1. x₁ (odd) = k−1."
  },
  {
    n:7, topic:"seq", tLabel:"Sequences",
    q:"a₀=1, a₁=1, aₙ=aₙ₋₁·aₙ₋₂+1 for n>1. Then a₄₆₅ and a₄₆₆ are",
    opts:["odd & even","odd & odd","even & even","even & odd"],
    hint:"Work out the parity pattern: which positions mod 3 give even terms?",
    ans:"(b) Both odd",
    sol:"Pattern: indices ≡ 2 (mod 3) are even, rest odd. 465 ≡ 0 (mod 3) → odd. 466 ≡ 1 (mod 3) → odd."
  },
  {
    n:8, topic:"speed", tLabel:"Work & Speed",
    q:"Two trains of equal length L travel at V₁, V₂ mph (opposite directions), cross in T seconds. L in feet (1 mile = 5280 ft) is",
    opts:["11T/15(V₁+V₂)","15T/11(V₁+V₂)","11(V₁+V₂)T/15","11(V₁+V₂)/15T"],
    hint:"Convert mph→ft/s: 1 mph = 5280/3600 = 22/15 ft/s. Relative speed × T = 2L.",
    ans:"(c) 11(V₁+V₂)T/15",
    sol:"Relative speed = 22(V₁+V₂)/15 ft/s. 2L = 22(V₁+V₂)T/15 → L = 11(V₁+V₂)T/15."
  },
  {
    n:9, topic:"arith", tLabel:"Arithmetic & %",
    q:"A salesman sold two pipes at ₹12 each — 20% profit on one, 20% loss on the other. Overall he",
    opts:["Lost Re 1","Gained Re 1","Neither","Lost ₹2"],
    hint:"Find cost price of each pipe separately from the selling price.",
    ans:"(a) Lost Re 1",
    sol:"CP of profit pipe = 12×100/120 = ₹10. CP of loss pipe = 12×100/80 = ₹15. Total CP=₹25, SP=₹24. Loss = ₹1."
  },
  {
    n:10, topic:"algebra", tLabel:"Algebra",
    q:"The value of (256)⁰·¹⁶ × (16)⁰·¹⁸ is",
    opts:["4","16","64","256.25"],
    hint:"Express both as powers of 2: 256 = 2⁸, 16 = 2⁴.",
    ans:"(a) 4",
    sol:"= 2^(8×0.16) × 2^(4×0.18) = 2^1.28 × 2^0.72 = 2^2 = 4."
  },
  {
    n:11, topic:"numtheo", tLabel:"Number Theory",
    q:"The units digit of 1! + 2! + 3! + … + 99! is",
    opts:["3","0","1","7"],
    hint:"For n ≥ 5, n! ends in 0. Only need 1!+2!+3!+4!.",
    ans:"(a) 3",
    sol:"1!+2!+3!+4! = 1+2+6+24 = 33. All higher factorials end in 0. Units digit = 3."
  },
  {
    n:12, topic:"calendar", tLabel:"Calendar & Clock",
    q:"July 3, 1977 was a Sunday. Then July 3, 1970 was a",
    opts:["Wednesday","Friday","Sunday","Tuesday"],
    hint:"Count total days between the two dates, then find remainder mod 7.",
    ans:"(b) Friday",
    sol:"Total days from Jul 3 1970 to Jul 3 1977 = 181+365+366+1095+366+184 = 2557. 2557 mod 7 = 2. Sunday − 2 = Friday."
  },
  {
    n:13, topic:"calendar", tLabel:"Calendar & Clock",
    q:"June 10, 1979 was a Sunday. Then May 10, 1972 was a",
    opts:["Wednesday","Thursday","Tuesday","Friday"],
    hint:"Count total days between the dates mod 7.",
    ans:"(a) Wednesday",
    sol:"Total days = 2587. 2587 mod 7 = 4. Sunday − 4 = Wednesday."
  },
  {
    n:14, topic:"speed", tLabel:"Work & Speed",
    q:"Man leaves home 14:30, arrives village at 15:15 (village clock). Stays 25 min, returns via route (5/4)× longer at 2× speed, arrives home 16:00. The village clock is",
    opts:["10 min slow","5 min slow","5 min fast","20 min fast"],
    hint:"Let travel-to-village time = t. Return time = (5/4)t / 2 = 5t/8. Total elapsed = 13t/8 + 25 = 90 min.",
    ans:"(c) 5 min fast",
    sol:"13t/8 + 25 = 90 → t = 40 min. Should arrive 14:30+40 = 15:10. Village shows 15:15 → 5 min fast."
  },
  {
    n:15, topic:"algebra", tLabel:"Algebra",
    q:"If (a+b)/(b+c) = (c+d)/(d+a), then",
    opts:["a = c","either a=c or a+b+c+d=0","a+b+c+d=0","a=c and b=d"],
    hint:"Cross-multiply and rearrange; factor out (a−c).",
    ans:"(b) either a = c or a+b+c+d = 0",
    sol:"Cross-multiplying and rearranging gives (a−c)(a+b+c+d) = 0."
  },
  {
    n:16, topic:"algebra", tLabel:"Algebra",
    q:"(1+q)(1+q²)(1+q⁴)(1+q⁸)(1+q¹⁶)(1+q³²)(1+q⁶⁴), q≠1, equals",
    opts:["(1−q¹²⁸)/(1−q)","(1−q⁶⁴)/(1−q)","(1−q^(telescoping))/(1−q)","None"],
    hint:"Multiply both sides by (1−q) and use the difference-of-squares identity repeatedly.",
    ans:"(a) (1 − q¹²⁸)/(1 − q)",
    sol:"Multiplying by (1−q) telescopes: (1−q)·E = (1−q²)·… = (1−q¹²⁸). So E = (1−q¹²⁸)/(1−q)."
  },
  {
    n:17, topic:"arith", tLabel:"Arithmetic & %",
    q:"In an election, 10% didn't vote, 60 blank votes, two candidates. Winner got 47% of listed voters and 308 more votes than rival. Number of voters on list is",
    opts:["3600","6200","4575","6028"],
    hint:"Let total = x. Valid votes = 0.9x − 60. Winner = 0.47x, rival = 0.43x − 60.",
    ans:"(b) 6200",
    sol:"0.47x − (0.43x−60) = 308 → 0.04x + 60 = 308 → x = 248×25 = 6200."
  },
  {
    n:18, topic:"arith", tLabel:"Arithmetic & %",
    q:"A student's marks in 5 papers are in ratio 6:7:8:9:10. He got 3/5 of total full marks. In how many papers did he get >50%?",
    opts:["2","3","4","5"],
    hint:"Total ratio = 40. Each paper's score = (3/5)×(ratio/40) × full marks. Compare to 50%.",
    ans:"(c) 4",
    sol:"Paper 1: 45%, Paper 2: 52.5%, Papers 3,4,5: ≥60%. So 4 papers exceed 50%."
  },
  {
    n:19, topic:"numtheo", tLabel:"Number Theory",
    q:"Two runners race 3 km on a 300 m circular track, speeds in ratio 4:3. How often and where does the winner pass the other?",
    opts:["4 times at start","Twice at start","Twice, 225 m from start","Twice, 75 m and 225 m"],
    hint:"Show that meeting at non-zero positions leads to non-integer equations. Then find meeting-at-start count.",
    ans:"(b) Twice, at the starting point",
    sol:"Meeting condition: x = 300(3n−4m), only x=0 (integer solution). Min loops: n=4, m=3. In 10 total loops they meet at start twice (at loop 4 and loop 8 of faster runner). 12th loop exceeds race."
  },
  {
    n:20, topic:"algebra", tLabel:"Algebra",
    q:"If a+7b+3c+5d=0; 8a+4b+6c+2d=−16; 2a+6b+4c+8d=16; 5a+3b+7c+d=−16, then (a+d)(b+c) =",
    opts:["16","−16","0","None"],
    hint:"Add equations (2)+(3) to get a+b+c+d=0. Add (1)+(4) with the previous result.",
    ans:"(b) −16",
    sol:"(2)+(3): a+b+c+d=0 → a+d = −(b+c). (1)+(4): 6(a+d)+10(b+c)=−16 → 4(b+c)=−16 → b+c=−4, a+d=4. Product = −16."
  },
  {
    n:21, topic:"algebra", tLabel:"Algebra",
    q:"x,y positive integers, x>y. 3x+2y ≡ 2 (mod 5) and 2x+3y ≡ 3 (mod 5). The remainder when x−y is divided by 5 is",
    opts:["2","1","4","None"],
    hint:"Subtract the two congruences.",
    ans:"(c) 4",
    sol:"(3x+2y)−(2x+3y) ≡ 2−3 → x−y ≡ −1 ≡ 4 (mod 5)."
  },
  {
    n:22, topic:"numtheo", tLabel:"Number Theory",
    q:"Number of different solutions (x,y,z) of x+y+z=10, each a positive integer, is",
    opts:["36","121","10³−10","¹⁰C₃−¹⁰C₂"],
    hint:"This is stars-and-bars with positive integers: substitute x'=x−1, etc.",
    ans:"(a) 36",
    sol:"Equivalent to distributing 7 among 3 non-negative integers: ⁹C₂ = 36."
  },
  {
    n:23, topic:"calendar", tLabel:"Calendar & Clock",
    q:"Clock hands observed from 12:45 pm. They point same direction some time between",
    opts:["1:03–1:04","1:04–1:05","1:05–1:06","1:06–1:07"],
    hint:"The minute hand catches the hour hand after 12:00 every 12/11 × 60 min. Work from 12:00.",
    ans:"(c) 1:05 – 1:06",
    sol:"Hands coincide after 12:00 at 12×60/11 ≈ 65.45 min = 1:05:27. So between 1:05 and 1:06."
  },
  {
    n:24, topic:"arith", tLabel:"Arithmetic & %",
    q:"Packets: (5A+3B+7C)=₹24.50, (2A+1B+3C)=₹17. Cost of (16A+9B+23C) is",
    opts:["₹55","₹75.50","₹100","Cannot determine"],
    hint:"Check if (16,9,23) is a linear combination of (5,3,7) and (2,1,3).",
    ans:"(c) ₹100",
    sol:"(16,9,23) = 2×(5,3,7) + 3×(2,1,3). Cost = 2×24.50 + 3×17 = 49+51 = ₹100."
  },
  {
    n:25, topic:"sets", tLabel:"Set Theory",
    q:"Correct statement about {1, 2, {1,2,3}}?",
    opts:["{1,2} ∈ {1,2,{1,2,3}}","{1,2} is a proper subset of {1,2,{1,2,3}}","{1,2,3} is a proper subset","3 ∈ {1,2,{1,2,3}}"],
    hint:"The elements are: 1, 2, and {1,2,3} (as a single object). Membership vs subset are different.",
    ans:"(b) {1,2} is a proper subset of {1,2,{1,2,3}}",
    sol:"{1,2} ⊂ {1,2,{1,2,3}} since both 1 and 2 are elements, and {1,2,3} (the third element) is not in {1,2}. So it's a proper subset."
  },
  {
    n:26, topic:"sets", tLabel:"Set Theory",
    q:"A simplex is a collection where every non-empty subset of any member is also in the collection. Which of the following is a simplex on {1,…,n}?",
    opts:["All subsets containing 1","All 4-element subsets","All non-empty subsets with no even number","All non-empty subsets except {1}"],
    hint:"For each option, try to find a counterexample where a subset of a member is NOT in the collection.",
    ans:"(c) All non-empty subsets with no even number",
    sol:"Any subset of an odd-only set is also odd-only and non-empty (as long as we take non-empty subsets). The others fail: (a) {2}⊂{1,2} but 2∉S; (b) 3-element subsets missing; (d) {1}⊂{1,2} but excluded."
  },
  {
    n:27, topic:"sets", tLabel:"Set Theory",

/* ─────────────────────────────────────────────
   TOPIC CONFIG
───────────────────────────────────────────── */
const topicClass = {
  arith:"t-arith", speed:"t-speed", seq:"t-seq", algebra:"t-algebra",
  numtheo:"t-numtheo", calendar:"t-calendar", sets:"t-sets",
  logic:"t-logic", analysis:"t-analysis", comb:"t-comb"
};

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
const grid = document.getElementById('grid');

Qs.forEach(q => {
  const tc = topicClass[q.topic] || '';
  const optHtml = q.opts.map((o,i) => `
    <div class="opt">
      <span class="opt-label">(${String.fromCharCode(97+i)})</span>
      <span>${o}</span>
    </div>`).join('');

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.topic = q.topic;
  card.innerHTML = `
    <div class="card-head">
      <span class="q-num">${q.n}</span>
      <span class="q-topic ${tc}">${q.tLabel}</span>
    </div>
    <div class="card-body">
      <div class="q-text">${q.q}</div>
      <div class="options">${optHtml}</div>
    </div>
    <div id="hint-box-${q.n}" class="reveal-box rb-hint">
      <div class="rb-head">💡 Hint</div>
      <div class="rb-body">${q.hint}</div>
    </div>
    <div id="ans-box-${q.n}" class="reveal-box rb-ans">
      <div class="rb-head">✓ Answer &amp; Solution</div>
      <div class="rb-body">
        <strong class="correct-opt">${q.ans}</strong><br><br>
        ${q.sol}
      </div>
    </div>
    <div class="card-foot">
      <button class="btn btn-hint" onclick="toggleBox('hint',${q.n},this)">Show Hint</button>
      <button class="btn btn-ans"  onclick="toggleBox('ans', ${q.n},this)">Show Answer</button>
    </div>`;
  grid.appendChild(card);
});

/* ─────────────────────────────────────────────
   TOGGLE BOXES
───────────────────────────────────────────── */
function toggleBox(type, n, btn) {
  const box = document.getElementById(`${type}-box-${n}`);
  const showing = box.classList.contains('show');
  box.classList.toggle('show', !showing);
  if (type === 'hint') {
    btn.textContent = showing ? 'Show Hint' : 'Hide Hint';
  } else {
    btn.textContent = showing ? 'Show Answer' : 'Hide Answer';
  }
  btn.classList.toggle('revealed', !showing);
}

/* ─────────────────────────────────────────────
   FILTER
───────────────────────────────────────────── */
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const topic = btn.dataset.topic;
  const cards = document.querySelectorAll('.card');
  let vis = 0;
  cards.forEach(c => {
    const hide = topic !== 'all' && c.dataset.topic !== topic;
    c.dataset.hidden = hide;
    if (!hide) vis++;
  });
  document.getElementById('vis-count').textContent = vis;
});
</script>
